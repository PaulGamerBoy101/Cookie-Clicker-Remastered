<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cookie Clicker Remastered</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="shortcut icon" href="favicon.png" />
</head>
<body>
    <div id="credits">
        <span>
            <b>Cookie Clicker Remastered</b> &copy; <a href="http://orteil.dashnet.org" target="_blank">⚙ ᕼᗅᑕKΞRƵ101 ⚙</a>, 2026
        </span>
    </div>

    <main id="game-container">
        <!-- Left Section: The Cookie -->
        <section class="panel" id="left-panel">
            <div id="money-container">
                <div id="money">0</div>
                <div id="cps">cookies/second: 0</div>
            </div>
            <div id="comment">Loading...</div>
            <div id="cookie-wrapper">
                <div id="cookie" onmouseup="ClickCookie();"></div>
            </div>
            <!-- Popups will be rendered here -->
            <div id="pops"></div>
        </section>

        <!-- Middle Section: Visual Buildings -->
        <section class="panel" id="middle-panel">
            <div id="building-visuals">
                <div id="grandmas"></div>
                <div id="factories"></div>
                <div id="mines"></div>
                <div id="shipments"></div>
                <div id="labs"></div>
                <div id="portals"></div>
                <div id="times"></div>
            </div>
        </section>

        <!-- Right Section: Store & Menu -->
        <section class="panel" id="right-panel">
            <div id="saveMenu">
                <button class="btn" onclick="ExportSave();">Export</button>
                <button class="btn" onclick="ImportSave();">Import</button>
                <button class="btn" onclick="Reset();">Reset</button>
                <button class="btn" id="toggleNumbers" onclick="ToggleNumbers();">Numbers On</button>
                <div id="version"></div>
            </div>
            <div id="store"></div>
        </section>
    </main>

    <div id="updateLog">
        <b>Update Log</b><br>
        v.0.126 Logic: Price scaling at 115%, accurate 2013 CPS rates.
    </div>

    <div id="hiddenLoader" style="display:none;"></div>
    <script src="script.js"></script>
</body>
</html>
